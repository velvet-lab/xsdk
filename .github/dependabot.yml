# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  #  Überwachung für NuGet
  - package-ecosystem: "nuget"
    directory: "/" # Scannt die gesamte Solution nach .csproj Files
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 3 # Verhindert, dass du am Montag von PRs erschlagen wirst
    groups:
      dotnet-dependencies:
        patterns:
          - "*" # Fasst alle NuGet-Updates in einem einzigen PR zusammen

  # Überwachung für GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly" # Actions ändern sich seltener, einmal im Monat reicht
    open-pull-requests-limit: 1

  # Überwachung für semantic-release und andere Node-Tools
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      release-tools:
        patterns:
          - "semantic-release"
          - "@semantic-release/*"
          - "conventional-changelog-*"
          - "@commitlint/*"
