# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Monitoring for NuGet
  - package-ecosystem: "nuget"
    directory: "/" # Scans the entire solution for .csproj files
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 3 # Prevents being overwhelmed by PRs on Monday
    groups:
      dotnet-dependencies:
        patterns:
          - "*" # Groups all NuGet updates into a single PR

  # Monitoring for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly" # Actions change less frequently; once a month is sufficient
    open-pull-requests-limit: 1

  # Monitoring for semantic-release and other Node tools
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    groups:
      release-tools:
        patterns:
          - "semantic-release"
          - "@semantic-release/*"
          - "conventional-changelog-*"
          - "@commitlint/*"
