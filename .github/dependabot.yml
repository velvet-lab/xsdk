version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly" # "daily" nervt meistens zu sehr
    open-pull-requests-limit: 5 # Damit du montags nicht von 20 PRs erschlagen wirst
    groups:
      dotnet-dependencies: # Fasst Updates zusammen, um die PR-Flut zu bändigen
        patterns:
          - "*"
