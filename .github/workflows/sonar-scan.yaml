name: Sonar Scan Check for Pull Requests
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - next
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  sonar:
    name: Sonar Code analysis
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Checking out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache SonarCloud Tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.sonar/cache
            ./.sonar/scanner
            ./.coverage/scanner
          key: ${{ runner.os }}-sonar-all-in-one

      - name: Install Tools
        shell: pwsh
        run: |
          if (!(Test-Path ./.sonar/scanner/dotnet-sonarscanner)) {
            dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner
          }
          if (!(Test-Path ./.coverage/scanner/dotnet-coverage)) {
            dotnet tool update dotnet-coverage --tool-path ./.coverage/scanner
          }

      - name: Scan pull request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: pwsh
        run: |
          # Dynamische Projektdaten
          $org = $env:GITHUB_REPOSITORY.Split("/")[0]
          $repo = $env:GITHUB_REPOSITORY.Split("/")[1]
          $projectKey = "${org}_${repo}"
          $version = (Get-Content ./package.json | ConvertFrom-Json).version

          # Basis-Argumente für Sonar
          $sonarArgs = @(
            "begin",
            "/o:`"$org`"",
            "/k:`"$projectKey`"",
            "/v:`"$version`"",
            "/d:sonar.token=`"$env:SONAR_TOKEN`"",
            "/d:sonar.qualitygate.wait=true",
            "/d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml"
          )

          # PR-Spezifische Argumente NUR hinzufügen, wenn wir in einem PR sind
          if ("${{ github.event_name }}" -eq "pull_request") {
            $sonarArgs += "/d:sonar.pullrequest.key=`"${{ github.event.pull_request.number }}`""
            $sonarArgs += "/d:sonar.pullrequest.branch=`"${{ github.head_ref }}`""
            $sonarArgs += "/d:sonar.pullrequest.base=`"${{ github.base_ref }}`""
            $sonarArgs += "/d:sonar.pullrequest.provider=GitHub"
          } else {
            # Wenn es kein PR ist (z.B. push auf main), scanne den aktuellen Branch
            $sonarArgs += "/d:sonar.branch.name=`"${{ github.ref_name }}`""
          }

          # Den Scanner mit allen gesammelten Argumenten aufrufen
          & ./.sonar/scanner/dotnet-sonarscanner @sonarArgs

          just dotnet::scan xsdk.sln

          ./.sonar/scanner/dotnet-sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"
