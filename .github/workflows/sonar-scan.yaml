name: Sonar Scan Check for Pull Requests
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - next
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  sonar:
    name: Sonar Code analysis
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup just
        uses: extractions/setup-just@v3

      - name: Checking out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache SonarCloud Tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.sonar/cache
            ./.sonar/scanner
            ./.coverage/scanner
          key: ${{ runner.os }}-sonar-all-in-one

      - name: Install Tools
        shell: pwsh
        run: |
          if (!(Test-Path ./.sonar/scanner/dotnet-sonarscanner)) {
            dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner
          }
          if (!(Test-Path ./.coverage/scanner/dotnet-coverage)) {
            dotnet tool update dotnet-coverage --tool-path ./.coverage/scanner
          }

      - name: Scan pull request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: pwsh
        run: |
          # 1. Daten sauber extrahieren
          $repoFull = $env:GITHUB_REPOSITORY
          $org = $repoFull.Split("/")[0]
          $repo = $repoFull.Split("/")[1]
          $projectKey = "${org}_${repo}"
          
          # Version aus package.json holen
          $packageJson = Get-Content ./package.json | ConvertFrom-Json
          $version = $packageJson.version

          # 2. Basis-Kommando vorbereiten
          $cmd = "./.sonar/scanner/dotnet-sonarscanner begin "
          $cmd += "/o:`"$org`" /k:`"$projectKey`" /v:`"$version`" "
          $cmd += "/d:sonar.token=`"$env:SONAR_TOKEN`" "
          $cmd += "/d:sonar.qualitygate.wait=true "
          $cmd += "/d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml "
          $cmd += "/d:sonar.scanner.skipJreProvisioning=true "

          # 3. PR-Logik hinzufügen
          if ("${{ github.event_name }}" -eq "pull_request") {
              $cmd += "/d:sonar.pullrequest.key=`"${{ github.event.pull_request.number }}`" "
              $cmd += "/d:sonar.pullrequest.branch=`"${{ github.head_ref }}`" "
              $cmd += "/d:sonar.pullrequest.base=`"${{ github.base_ref }}`" "
              $cmd += "/d:sonar.pullrequest.provider=GitHub "
          } else {
              $cmd += "/d:sonar.branch.name=`"${{ github.ref_name }}`" "
          }

          # 4. Ausführen (Invoke-Expression ist hier am sichersten für lange Parameterketten)
          Write-Host "Starting Sonar Scanner with: $cmd"
          Invoke-Expression $cmd

          just dotnet::scan xsdk.sln

          ./.sonar/scanner/dotnet-sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"
