name: 'SonarCloud Analysis'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - next
      - main
    paths-ignore:
      - '**.md'
      # - '.github/**'
      - '.gitignore'
      - '.just/**'
      - '.vscode/**'
      - 'demos/**'
      - 'docs/**'
      - 'tools/**'

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  sonar-analysis:
    name: SonarQube Quality Gate
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Checking out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4

      - name: Cache SonarCloud Tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.sonar/cache
            ./.sonar/scanner
            ./.coverage/scanner
          key: ${{ runner.os }}-sonar-all-in-one

      - name: Install DotNet Tools
        shell: pwsh
        run: |
          if (!(Test-Path ./.sonar/scanner/dotnet-sonarscanner)) {
            dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner
          }
          if (!(Test-Path ./.coverage/scanner/dotnet-coverage)) {
            dotnet tool update dotnet-coverage --tool-path ./.coverage/scanner
          }

      - name: Restore DotNet dependencies
        shell: pwsh
        run: just dotnet::restore xsdk.sln

      - name: Sonar scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PR_NUMBER: ${{ github.event.pull_request.number }}
          SONAR_PR_BRANCH: ${{ github.head_ref }}
          SONAR_PR_BASE: ${{ github.base_ref }}
        shell: pwsh
        run: |
          $org, $repo = $env:GITHUB_REPOSITORY -split '/', 2
          $projectKey  = "${org}_${repo}"
          $version     = (Get-Content ./package.json | ConvertFrom-Json).version

          $beginArgs = @(
            "begin"
            "/o:$org"
            "/k:$projectKey"
            "/v:$version"
            "/d:sonar.token=$env:SONAR_TOKEN"
            "/d:sonar.qualitygate.wait=false"
            "/d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml"
            "/d:sonar.scanner.skipJreProvisioning=true"
          )

          if ($env:GITHUB_EVENT_NAME -eq "pull_request") {
            $beginArgs += @(
              "/d:sonar.pullrequest.key=$env:SONAR_PR_NUMBER"
              "/d:sonar.pullrequest.branch=$env:SONAR_PR_BRANCH"
              "/d:sonar.pullrequest.base=$env:SONAR_PR_BASE"
              "/d:sonar.pullrequest.provider=GitHub"
            )
          } else {
            $beginArgs += "/d:sonar.branch.name=$env:GITHUB_REF_NAME"
          }

          & ./.sonar/scanner/dotnet-sonarscanner @beginArgs
          dotnet build xsdk.sln --configuration Debug --no-incremental --nologo --no-restore
          & ./.coverage/scanner/dotnet-coverage collect "dotnet test xsdk.sln --no-build --no-restore --nologo" --output-format xml --output coverage.xml --nologo
          & ./.sonar/scanner/dotnet-sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"
