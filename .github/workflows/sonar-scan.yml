name: 'SonarCloud Analysis'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - next
      - main
    paths-ignore:
      - '**.md'
      # - '.github/**'
      - '.gitignore'
      - '.just/**'
      - '.vscode/**'
      - 'demos/**'
      - 'docs/**'
      - 'tools/**'

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true

jobs:
  sonar-analysis:
    name: SonarQube Quality Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup repository
        uses: ./.github/actions/setup-repository

      - name: Cache Sonar Scanner
        uses: actions/cache@v4
        with:
          path: |
            ~/.sonar/cache
          key: ${{ runner.os }}-sonar-cache

      # TRICKY: To get clean results for sonar scan, we need to ensure that all dependencies are restored and
      # the build is successful before running the scan. This is because Sonar Scanner analyzes the compiled
      # code and needs all dependencies to be in place to provide accurate results.
      - name: Restore DotNet dependencies
        shell: pwsh
        run: just dotnet::restore xsdk.sln

      - name: Sonar scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: pwsh
        run: |
          $org, $repo = $env:GITHUB_REPOSITORY -split '/', 2
          $projectKey  = "${org}_${repo}"
          $version     = (Get-Content ./package.json | ConvertFrom-Json).version

          $beginArgs = @(
            "begin"
            "/o:$org"
            "/k:$projectKey"
            "/v:$version"
            "/d:sonar.token=$env:SONAR_TOKEN"
            "/d:sonar.qualitygate.wait=false"
            "/d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml"
            "/d:sonar.scanner.skipJreProvisioning=true"
          )

          $beginArgs += "/d:sonar.branch.name=$env:GITHUB_REF_NAME"

          dotnet dotnet-sonarscanner @beginArgs
          just dotnet::sonar-build xsdk.sln
          dotnet dotnet-sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"
