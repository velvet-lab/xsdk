name: Build next branch

on:
  push:
    branches:
      - next

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_NOLOGO: true
  RUNNER_TOOL_CACHE: /toolcache

jobs:
  build:
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write

    name: Build all projects
    runs-on: ubuntu-latest
    steps:
      - name: Checking out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup repository
        uses: ./.github/actions/setup-repository

      - name: Create release
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN_READ }}
        shell: bash
        run: just release

      - name: Scan for code issues
        if: success()
        uses: ./.github/actions/code-scan
        with:
          sonar_token: ${{ secrets.SONAR_TOKEN }}

      - name: Publish artifacts
        if: success()
        shell: pwsh
        run: just dotnet::publish xsdk.sln ${{ secrets.NUGET_API_KEY }}
