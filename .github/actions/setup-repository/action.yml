name: "setup-repository"
description: "Composite action to prepare runner for xSDK development (checkout, .NET, Node, PNPM, Just, caching, tool restore)."

inputs:
  disable-dotnet:
    description: "If 'true', skip .NET setup"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup pnpm
      uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'
        cache: 'pnpm'

    - name: Setup .NET
      if: ${{ inputs.disable-dotnet != 'true' }}
      uses: actions/setup-dotnet@v4

    - name: Setup just
      uses: extractions/setup-just@f8a3cce218d9f83db3a2ecd90e41ac3de6cdfd9b

    - name: Install Repository Tools and Dependencies
      if: ${{ inputs.disable-dotnet != 'true' }}
      shell: pwsh
      run: just install

    - name: Cache NuGet packages
      if: ${{ inputs.disable-dotnet != 'true' }}
      uses: actions/cache@v4
      with:
        path: |
          ~/.nuget/packages
          ~/.local/share/NuGet
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/global.json') }}
        restore-keys: ${{ runner.os }}-nuget-

    - name: Cache npm
      uses: actions/cache@v4
      with:
        path: ~/.npm
        key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}
        restore-keys: ${{ runner.os }}-npm-

    - name: Cache pnpm
      uses: actions/cache@v4
      with:
        path: ~/.pnpm-store
        key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: ${{ runner.os }}-pnpm-
