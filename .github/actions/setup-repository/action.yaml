name: Setup workflows
description: Prepares the workflow for running

runs:
  using: composite
  steps:
    - name: Setup just
      uses: extractions/setup-just@v3

    - name: Use Node.js
      uses: actions/setup-node@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v1
      with:
        java-version: 17

    - name: Install dependencies
      shell: bash
      run: just install
