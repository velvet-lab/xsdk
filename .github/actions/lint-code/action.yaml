name: Source code linter
description: Lints source code with megalinter

runs:
  using: composite
  steps:
    - name: Lint Code
      id: ml
      env:
        APPLY_FIXES: all
        APPLY_FIXES_EVENT: push
        APPLY_FIXES_MODE: commit
        VALIDATE_ALL_CODEBASE: true
      uses: oxsecurity/megalinter@v8

    - name: Create bug issue on lint failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: 'CI: Code linting failed',
            body: 'MegaLinter found issues that could not be automatically fixed. Please review the linting reports.',
            labels: ['bug', 'ci'],
            assignees: [context.actor]
          })

    - name: Commit changes
      if: success() && steps.ml.outputs.has_updated_sources == 'true'
      uses: EndBug/add-and-commit@v9
      with:
        message: 'style: Linting and formatting code [skip ci] [skip release]'

    - name: Upload MegaLinter reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: MegaLinter reports
        path: megalinter-reports
