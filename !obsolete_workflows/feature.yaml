name: Build feature branch

on:
  push:
    branches:
      - feature-*

jobs:
  lint:
    uses: ./.github/workflows/_lint.yaml

  test:
    uses: ./.github/workflows/_test.yaml

  create_bug_issue:
    name: Create bug issue on CI failure
    needs: [lint, test]
    if: ${{ always() && (needs.lint.result == 'failure' || needs.test.result == 'failure') }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create bug issue for failing CI
        uses: peter-evans/create-issue@v4
        with:
          title: "CI: Build failed on feature branch ${{ github.ref_name }}"
          body: |
            Automated issue created because the CI failed in workflow ${{ github.workflow }} on run #${{ github.run_number }}.

            - Branch: ${{ github.ref_name }}
            - Commit: ${{ github.sha }}
            - Workflow: ${{ github.workflow }}
            - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please check the failing steps and push a fix.
          labels: bug, ci
